version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    reviewers:
      - "noktirnal42"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    
  # Check for Swift Package Manager dependencies
  - package-ecosystem: "swift"
    directory: "/SwiftMentor"
    schedule:
      interval: "weekly"
    reviewers:
      - "noktirnal42"
    labels:
      - "dependencies"
      - "swift"
    commit-message:
      prefix: "chore(deps-swift)"
    open-pull-requests-limit: 10
    
  # Check for CocoaPods dependencies (if applicable)
  - package-ecosystem: "cocoapods"
    directory: "/SwiftMentor"
    schedule:
      interval: "weekly"
    reviewers:
      - "noktirnal42"
    labels:
      - "dependencies"
      - "cocoapods"
    commit-message:
      prefix: "chore(deps-cocoapods)"
    open-pull-requests-limit: 10

name: "CodeQL Advanced Analysis"

on:
  push:
    branches: [main, develop]
    paths:
      - 'SwiftMentor/**'
      - '*.swift'
  pull_request:
    branches: [main, develop]
    paths:
      - 'SwiftMentor/**'
      - '*.swift'
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM
  workflow_dispatch:

# Permissions are required for CodeQL to upload SARIF results and comment on PRs
permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        language: ['swift']
        include:
          - language: swift
            query-suite: security-extended
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: |
          cd SwiftMentor
          xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          queries: ${{ matrix.query-suite }}
          config: |
            paths-ignore:
              - '**/Tests/**'
              - '**/Preview Content/**'
              - '**/*.swift.gyb'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        with:
          working-directory: SwiftMentor

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
          output: sarif-results
          upload: true

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CodeQL-SARIF
          path: sarif-results
          retention-days: 30

  codeql-database:
    name: Create CodeQL Database
    runs-on: macos-15
    needs: analyze
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install CodeQL CLI
        run: |
          brew install codeql

      - name: Create CodeQL Database
        run: |
          codeql database create codeql-db --language=swift --source-root .
        continue-on-error: true

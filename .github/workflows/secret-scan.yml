name: 'Secret Scanning'

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Permissions for secret scanning
permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS Scan
        uses: trufflesecurity/trufflehog@v3.63.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Check for common secret patterns
        run: |
          echo "Scanning for common secret patterns..."
          
          # Check for API keys
          if grep -rE "(api[_-]?key|apikey|api[_-]?secret)" --include="*.swift" --include="*.plist" --include="*.json" . | grep -v "example" | grep -v "YOUR_"; then
            echo "⚠️ Potential API key patterns found"
          fi
          
          # Check for passwords
          if grep -rE "(password|passwd|pwd)[[:space:]]*=[[:space:]]*['\"]" --include="*.swift" . | grep -v "example"; then
            echo "⚠️ Potential hardcoded password found"
          fi
          
          # Check for tokens
          if grep -rE "(token|auth)[[:space:]]*=[[:space:]]*['\"][a-zA-Z0-9]" --include="*.swift" . | grep -v "example"; then
            echo "⚠️ Potential token found"
          fi
          
          echo "✅ Secret scan completed"

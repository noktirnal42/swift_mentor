name: SwiftMentor

options:
  bundleIdPrefix: com.swiftmentor
  deploymentTarget:
    macOS: "15.4"
  xcodeVersion: "26.4.1"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_NAME: SwiftMentor
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.4"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
    HARDENED_RUNTIME_CAPABILITY_INHERIT: NO
    COMBINE_HIDPI_IMAGES: YES
    SWIFT_COMPILATION_MODE: wholemodule

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    version: 0.15.4
  Splash:
    url: https://github.com/JohnSundell/Splash
    version: 0.16.0

targets:
  SwiftMentor:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
      - path: Database
      - path: Extensions
      - path: Managers
      - path: Config
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Lessons
        buildPhase: resources
      - path: Resources/LearningPaths
        buildPhase: resources
      - path: Resources/Snippets
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Supporting/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftmentor.macos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_COMPILATION_MODE: singlefile
        EXPLICIT_MODULE_BUILD: NO
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
        CLANG_ENABLE_EXPLICIT_MODULES: NO
    entitlements:
      path: Supporting/SwiftMentor.entitlements
      properties:
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true

schemes:
  SwiftMentor:
    build:
      targets:
        SwiftMentor: all
    run:
      config: Debug
    archive:
      config: Release
